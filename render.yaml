services:
  - type: web
    name: adore-app
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Set in Render dashboard — link your Postgres DB
      - key: JWT_SECRET
        sync: false          # Generate: openssl rand -base64 48
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://yourdomain.com (leave blank = allow all)
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
